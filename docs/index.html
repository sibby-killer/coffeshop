<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Complete - CoffeeCafe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FAFAFA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 400px;
            width: 100%;
        }
        .icon { font-size: 64px; margin-bottom: 16px; }
        h1 { color: #6D4C41; font-size: 22px; margin-bottom: 8px; }
        p { color: #888; font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
        .open-btn {
            display: inline-block;
            background: #FF8F00;
            color: white;
            text-decoration: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.2s;
            border: none;
            cursor: pointer;
        }
        .open-btn:hover { background: #E65100; }
        .hint { color: #BBBBBB; font-size: 12px; margin-top: 16px; }
        .loading { color: #888; font-size: 14px; margin-bottom: 16px; }
        .spinner {
            width: 40px; height: 40px;
            border: 4px solid #EEEEEE;
            border-top: 4px solid #FF8F00;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="card">
        <div id="loading-state">
            <div class="spinner"></div>
            <h1>Processing Payment...</h1>
            <p class="loading">Please wait while we confirm your payment.</p>
        </div>
        <div id="success-state" style="display:none;">
            <div class="icon">&#9749;</div>
            <h1>Payment Successful!</h1>
            <p>Your payment has been confirmed. Tap below to open CoffeeCafe and track your order.</p>
            <a id="open-app-btn" href="coffeecafe://orders" class="open-btn">Open CoffeeCafe</a>
            <p class="hint">If the app didn't open, tap the button again or open CoffeeCafe manually.</p>
        </div>
    </div>
    <script>
        (function() {
            var params = new URLSearchParams(window.location.search);
            var reference = params.get('reference') || params.get('trxref') || '';

            if (reference) {
                // Build deep link with reference so the app can verify it
                var deepLink = 'coffeecafe://orders?reference=' + encodeURIComponent(reference);

                // Try deep link immediately
                window.location.href = deepLink;

                // After a short delay, show the button
                setTimeout(function() {
                    document.getElementById('loading-state').style.display = 'none';
                    document.getElementById('success-state').style.display = 'block';
                    document.getElementById('open-app-btn').href = deepLink;
                }, 2000);
            } else {
                // No reference — just show the button
                document.getElementById('loading-state').style.display = 'none';
                document.getElementById('success-state').style.display = 'block';
                document.getElementById('open-app-btn').href = 'coffeecafe://orders';
            }
        })();
    </script>
</body>
</html>
