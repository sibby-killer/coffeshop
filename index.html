<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Complete - CoffeeCafe</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: #FAFAFA;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: white;
            border-radius: 16px;
            padding: 40px 30px;
            text-align: center;
            box-shadow: 0 2px 12px rgba(0,0,0,0.08);
            max-width: 400px;
            width: 100%;
        }
        .icon { font-size: 64px; margin-bottom: 16px; }
        h1 { color: #6D4C41; font-size: 22px; margin-bottom: 8px; }
        p { color: #888; font-size: 14px; line-height: 1.5; margin-bottom: 24px; }
        .open-btn {
            display: inline-block;
            background: #FF8F00;
            color: white;
            text-decoration: none;
            padding: 14px 40px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: 600;
            transition: background 0.2s;
        }
        .open-btn:hover { background: #E65100; }
        .hint { color: #BBBBBB; font-size: 12px; margin-top: 16px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">&#9749;</div>
        <h1>Payment Successful!</h1>
        <p>Your order has been placed. Tap below to open CoffeeCafe and track your order.</p>
        <a href="coffeecafe://orders" class="open-btn">Open CoffeeCafe</a>
        <p class="hint">If the app didn't open, tap the button again or open CoffeeCafe manually.</p>
    </div>
    <script>
        // Auto-try deep link on page load
        window.onload = function() {
            window.location.href = "coffeecafe://orders";
        };
    </script>
</body>
</html>
