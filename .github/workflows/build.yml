name: Build & Release APK

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Debug APK
        run: ./gradlew assembleDebug --no-daemon

      - name: Upload Debug APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/app-debug.apk

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/v')

    permissions:
      contents: write

    steps:
      - name: Download Debug APK
        uses: actions/download-artifact@v4
        with:
          name: app-debug

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/v}" >> $GITHUB_OUTPUT

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          name: "Coffee Shop v${{ steps.version.outputs.VERSION }}"
          body: |
            ## Coffee Shop App v${{ steps.version.outputs.VERSION }}

            ### Download
            Download `app-debug.apk` below and install on your Android device.

            ### What's New
            See commits since last release: https://github.com/${{ github.repository }}/compare/${{ github.event.before }}...${{ github.ref_name }}

            ### Setup
            1. Download `app-debug.apk` from assets below
            2. Install on Android device (enable "Install from unknown sources")
            3. Login with admin credentials or create a new account

            ### Test Credentials
            - **Admin**: alfrednyongesa411@gmail.com / Admin@12345
            - **Paystack Test Card**: 4084084084084081, Exp: 12/26, CVV: 408
          files: |
            app-debug.apk
          draft: false
          prerelease: false
